name: Build frontend image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: frontend-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker-h5/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check deployment notification configuration
        id: dispatch_config
        shell: bash
        env:
          TOKEN: ${{ secrets.BACKEND_DISPATCH_TOKEN }}
        run: |
          if [[ -n "$TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify backend deployment workflow
        if: steps.dispatch_config.outputs.enabled == 'true'
        shell: bash
        env:
          BACKEND_DISPATCH_TOKEN: ${{ secrets.BACKEND_DISPATCH_TOKEN }}
        run: |
          payload=$(jq -nc \
            --arg sha "$GITHUB_SHA" \
            '{event_type:"frontend-image-published",client_payload:{sha:$sha}}')

          curl --fail-with-body --retry 3 \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $BACKEND_DISPATCH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/hyc131456/love-backend/dispatches \
            --data "$payload"

      - name: Report disabled deployment notification
        if: steps.dispatch_config.outputs.enabled == 'false'
        run: echo "::notice::Frontend image was published, but backend deployment notification is disabled because BACKEND_DISPATCH_TOKEN is not configured."
